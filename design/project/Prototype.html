<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Site — Prototype</title>
<link rel="stylesheet" href="styles/canvas-reset.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; background: #f1e9df; min-height: 100vh; }
  body { font-family: 'Newsreader', Georgia, serif; color: #1f1a16; }
  * { box-sizing: border-box; }

  /* Paper texture */
  .paper-a { background:
    radial-gradient(circle at 20% 30%, rgba(120, 90, 60, 0.035), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120, 90, 60, 0.04), transparent 45%),
    #f1e9df;
  }

  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .page-fade { opacity: 1; animation: fadeIn 320ms cubic-bezier(0.2, 0.7, 0.2, 1) both; }

  /* ============================================================
     MOBILE — <=768px
     Inline styles get overridden via !important on targeted classes
     ============================================================ */
  @media (max-width: 768px) {
    /* Nav */
    .m-nav { padding: 14px 20px 12px !important; flex-wrap: wrap !important; gap: 8px !important; }
    .m-nav-brand { font-size: 18px !important; }
    .m-nav-est { display: none !important; }
    .m-nav-links { gap: 14px !important; font-size: 10px !important; flex-wrap: wrap !important; width: 100% !important; justify-content: space-between !important; }

    /* Page-level side padding */
    .m-page-pad { padding-left: 20px !important; padding-right: 20px !important; }
    .m-page-pad-inner { padding-left: 20px !important; padding-right: 20px !important; }

    /* Section strip */
    .m-strip { font-size: 8px !important; gap: 8px !important; flex-wrap: wrap !important; }
    .m-strip > span { flex: 1 1 auto !important; }

    /* Hero / title scale */
    .m-hero-title { font-size: 68px !important; letter-spacing: -1.2px !important; }
    .m-page-title { font-size: 46px !important; letter-spacing: -1px !important; }
    .m-about-intro { font-size: 28px !important; }

    /* Grids collapse */
    .m-2col, .m-3col, .m-5col { grid-template-columns: 1fr !important; gap: 28px !important; }
    .m-blog-row { grid-template-columns: 1fr !important; gap: 8px !important; }
    .m-blog-row > div:nth-child(3) { justify-content: flex-start !important; }
    .m-proj-row { grid-template-columns: 1fr !important; gap: 6px !important; }
    .m-proj-head { display: none !important; }
    .m-about-grid { grid-template-columns: 1fr !important; gap: 56px !important; padding-top: 28px !important; }

    /* Home-specific */
    .m-home-photo { min-height: 360px !important; margin-top: 20px !important; }

    /* Favorites */
    .m-fav-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .m-vinyl-wrap { min-height: 320px !important; transform: scale(0.78) !important; transform-origin: center top !important; }
    .m-rack { grid-template-columns: repeat(4, 1fr) !important; }
    .m-liner { column-count: 1 !important; }
    .m-movies-cards { grid-template-columns: 1fr !important; }
    .m-movies-tickets { grid-template-columns: 1fr !important; }

    /* Trip scrapbook */
    .m-scrap-cols { column-count: 1 !important; }
    .m-trip-head { grid-template-columns: 1fr !important; gap: 32px !important; }
    .m-trip-stamp { justify-self: start !important; }
    .m-trip-title { font-size: 64px !important; letter-spacing: -1.2px !important; }

    /* Tweaks panel */
    .m-tweaks { left: 12px !important; right: 12px !important; bottom: 12px !important; min-width: 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="direction-data.jsx?v=24"></script>
<script type="text/babel" src="prototype-core.jsx?v=24"></script>
<script type="text/babel" src="prototype-pages.jsx?v=24"></script>
<script type="text/babel" src="china-detail-shared.jsx?v=24"></script>
<script type="text/babel" src="china-detail.jsx?v=24"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ==== Tweakable defaults ====
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accentColor": "navy",
  "serifStyle": "newsreader",
  "showMetrics": true
}/*EDITMODE-END*/;

const ACCENTS = {
  rust:    "oklch(0.52 0.13 40)",
  forest:  "oklch(0.45 0.08 155)",
  navy:    "oklch(0.38 0.08 250)",
  plum:    "oklch(0.42 0.1 340)",
};

function App() {
  // Route: "home" | "blog" | "travels" | "travels/china-24" | "projects" | "favorites" | "about"
  const [route, setRoute] = useState(() => {
    try { return localStorage.getItem("route") || "home"; } catch { return "home"; }
  });
  const [accentColor, setAccent] = useState(TWEAKS.accentColor);
  const [serifStyle, setSerifStyle] = useState(TWEAKS.serifStyle);
  const [showMetrics, setShowMetrics] = useState(TWEAKS.showMetrics);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { try { localStorage.setItem("route", route); } catch {} }, [route]);

  // Edit-mode bridge
  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function persist(key, val) {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }

  const theme = {
    accent: ACCENTS[accentColor] || ACCENTS.rust,
    serif: serifStyle === "fraunces" ? "'Fraunces', Georgia, serif" : "'Newsreader', Georgia, serif",
    showMetrics,
  };

  const ctx = { route, setRoute, theme };

  return (
    <>
      <RouteView {...ctx} />

      {editMode && (
        <div className="m-tweaks" style={{
          position: "fixed", bottom: 20, right: 20, zIndex: 9999,
          background: "#1a1512", color: "#f1e9df",
          border: `1px solid ${theme.accent}`,
          padding: 20, borderRadius: 4,
          fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
          minWidth: 280,
          boxShadow: "0 16px 40px rgba(0,0,0,0.35)",
        }}>
          <div style={{ fontSize: 9, letterSpacing: 2.2, opacity: 0.55, textTransform: "uppercase", marginBottom: 18, borderBottom: "1px solid rgba(241,233,223,0.15)", paddingBottom: 10 }}>
            TWEAKS · DIRECTION A
          </div>

          <TweakRow label="Accent">
            {Object.entries(ACCENTS).map(([k, v]) => (
              <div key={k} onClick={() => { setAccent(k); persist("accentColor", k); }}
                style={{
                  width: 26, height: 26, background: v, cursor: "pointer",
                  border: `2px solid ${accentColor === k ? "#f1e9df" : "transparent"}`,
                  boxShadow: accentColor === k ? `0 0 0 1px ${v}` : "none",
                }} title={k} />
            ))}
          </TweakRow>

          <TweakRow label="Serif">
            {[["newsreader", "Newsreader"], ["fraunces", "Fraunces"]].map(([k, lbl]) => (
              <div key={k} onClick={() => { setSerifStyle(k); persist("serifStyle", k); }}
                style={{
                  padding: "6px 10px", fontSize: 10,
                  border: `1px solid ${serifStyle === k ? theme.accent : "rgba(241,233,223,0.2)"}`,
                  background: serifStyle === k ? theme.accent : "transparent",
                  cursor: "pointer", flex: 1, textAlign: "center", letterSpacing: 1,
                }}>{lbl}</div>
            ))}
          </TweakRow>

          <TweakRow label="Project metrics">
            {[[true, "Show"], [false, "Hide"]].map(([k, lbl]) => (
              <div key={String(k)} onClick={() => { setShowMetrics(k); persist("showMetrics", k); }}
                style={{
                  padding: "6px 10px", fontSize: 10,
                  border: `1px solid ${showMetrics === k ? theme.accent : "rgba(241,233,223,0.2)"}`,
                  background: showMetrics === k ? theme.accent : "transparent",
                  cursor: "pointer", flex: 1, textAlign: "center", letterSpacing: 1,
                }}>{lbl}</div>
            ))}
          </TweakRow>

        </div>
      )}
    </>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 9, opacity: 0.55, letterSpacing: 1.4, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", gap: 6 }}>{children}</div>
    </div>
  );
}

function RouteView(props) {
  const { route } = props;
  if (route === "home") return <PageHome key="home" {...props} />;
  if (route === "blog") return <PageBlog key="blog" {...props} />;
  if (route.startsWith("blog/")) {
    const slug = route.split("/")[1];
    return <PageBlogPost key={"blog-" + slug} slug={slug} {...props} />;
  }
  if (route === "projects") return <PageProjects key="projects" {...props} />;
  if (route.startsWith("projects/")) {
    const slug = route.split("/")[1];
    return <PageProject key={"project-" + slug} slug={slug} {...props} />;
  }
  if (route === "favorites") return <PageFavorites key="favorites" {...props} />;
  if (route === "about") return <PageAbout key="about" {...props} />;
  if (route === "travels") return <PageTravels key="travels" {...props} />;
  if (route === "travels/china-24") return <PageChinaDetail key="china-24" {...props} />;
  if (route.startsWith("travels/")) {
    const tripId = route.split("/")[1];
    return <PageTrip key={route} tripId={tripId} {...props} />;
  }
  return <PageHome {...props} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
